name: Apply permanent morning routine v2

on:
  push:
    branches:
      - feature/permanent-morning-routine-card-v2
    paths:
      - scripts/apply-permanent-morning-routine-v2.mjs
      - .github/workflows/apply-permanent-morning-routine-v2.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-test-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/permanent-morning-routine-card-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply targeted implementation
        run: node scripts/apply-permanent-morning-routine-v2.mjs
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/utils/unifiedPlannerCards.js src/utils/unifiedPlannerCards.test.js
          git commit -m "fix: make morning routine a permanent day-start card"
          git push origin HEAD:feature/permanent-morning-routine-card-v2
      - name: Install dependencies
        run: npm ci
      - name: Run full tests
        run: node --test
      - name: Build production bundle
        run: npm run build
      - name: Remove one-shot patch files
        if: always()
        run: |
          git pull --rebase origin feature/permanent-morning-routine-card-v2
          git rm -f scripts/apply-permanent-morning-routine-v2.mjs .github/workflows/apply-permanent-morning-routine-v2.yml
          git commit -m "chore: remove one-shot morning routine patch"
          git push origin HEAD:feature/permanent-morning-routine-card-v2
